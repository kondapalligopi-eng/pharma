services:
  # -------------------------------------------------------------------------
  # Frontend — React (Static Site, Vite + vite-react-ssg)
  # -------------------------------------------------------------------------
  - type: web
    name: brightwell-pharma-frontend
    env: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Single-page site. SPA fallback handles everything.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
